<?xml version="1.0"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AgentOS app icon">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#F97316"></stop>
          <stop offset="52%" stop-color="#EA580C"></stop>
          <stop offset="100%" stop-color="#D4AF6A"></stop>
        </linearGradient>

        <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"></stop>
          <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.04"></stop>
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
        </linearGradient>

        <linearGradient id="ring" x1="0.18" y1="0.06" x2="0.82" y2="0.94">
          <stop offset="0%" stop-color="#FFFCF6"></stop>
          <stop offset="50%" stop-color="#FFF7ED"></stop>
          <stop offset="100%" stop-color="#F1DEBE"></stop>
        </linearGradient>

        <linearGradient id="handle" x1="0.1" y1="0.1" x2="0.9" y2="0.9">
          <stop offset="0%" stop-color="#FFFBF4"></stop>
          <stop offset="58%" stop-color="#FBEFD9"></stop>
          <stop offset="100%" stop-color="#E7CD9C"></stop>
        </linearGradient>

        <radialGradient id="lens" cx="0.42" cy="0.36" r="0.88">
          <stop offset="0%" stop-color="#34261B"></stop>
          <stop offset="58%" stop-color="#211812"></stop>
          <stop offset="100%" stop-color="#130E0B"></stop>
        </radialGradient>

        <radialGradient id="eye" cx="0.42" cy="0.36" r="0.78">
          <stop offset="0%" stop-color="#FFFBF0"></stop>
          <stop offset="55%" stop-color="#FCEFCF"></stop>
          <stop offset="100%" stop-color="#E7C988"></stop>
        </radialGradient>

        <clipPath id="squircle"><rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"></rect></clipPath>

        <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1C1917" flood-opacity="0.28"></feDropShadow>
        </filter>
        <filter id="eyeGlow" x="-160%" y="-160%" width="420%" height="420%">
          <feGaussianBlur stdDeviation="12"></feGaussianBlur>
        </filter>
        <filter id="shadowBlur" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="26"></feGaussianBlur>
        </filter>

        <g id="silhouette">
          <line x1="606" y1="603" x2="752" y2="748" stroke="#000" stroke-width="62" stroke-linecap="round"></line>
          <circle cx="468" cy="452" r="208"></circle>
        </g>
      </defs>

      <g clip-path="url(#squircle)">
        <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"></rect>

        
        <use href="#silhouette" fill="#1C1917" opacity="0.20" filter="url(#shadowBlur)" transform="translate(58 74)"></use>

        
        <g filter="url(#soft)">
          
          <line x1="604" y1="601" x2="754" y2="750" stroke="#1C1917" stroke-width="64" stroke-linecap="round"></line>
          <line x1="606" y1="603" x2="752" y2="748" stroke="url(#handle)" stroke-width="54" stroke-linecap="round"></line>
          <line x1="604" y1="609" x2="734" y2="739" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.4"></line>

          
          <circle cx="468" cy="452" r="210" fill="#1C1917"></circle>
          <circle cx="468" cy="452" r="206" fill="url(#ring)"></circle>

          
          <circle cx="468" cy="452" r="170" fill="#1C1917"></circle>
          <circle cx="468" cy="452" r="166" fill="url(#lens)"></circle>
        </g>

        
        <path d="M 322 348 A 206 206 0 0 1 532 268" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" opacity="0.5"></path>

        
        <clipPath id="inside"><circle cx="468" cy="452" r="166"></circle></clipPath>
        <g clip-path="url(#inside)">
          <circle cx="430" cy="452" r="40" fill="#C9A44C" opacity="0.42" filter="url(#eyeGlow)"></circle>
          <circle cx="506" cy="452" r="40" fill="#C9A44C" opacity="0.42" filter="url(#eyeGlow)"></circle>
          <circle cx="430" cy="452" r="29" fill="url(#eye)"></circle>
          <circle cx="506" cy="452" r="29" fill="url(#eye)"></circle>
          <circle cx="422" cy="443" r="7.5" fill="#FFFFFF" opacity="0.9"></circle>
          <circle cx="498" cy="443" r="7.5" fill="#FFFFFF" opacity="0.9"></circle>
        </g>

        
        <rect x="0" y="0" width="1024" height="470" fill="url(#gloss)"></rect>
      </g>
    </svg>